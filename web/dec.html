<!doctype html>
<html lang="en" data-framework="javascript">
<head>
<title>Cimbar Decoder</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no">
<link rel="manifest" href="pwa.json">
</head>
<body>

<style>
	#container {
		position: fixed;
		top: 0;
		left: 0;
		right: 0;
		bottom: 0;
		z-index: -100;
		overflow: hidden; /* Hide scrollbars */
	}

    video {
		height: 100%;
		width: 100%;
		z-index: -100;
		background-size: cover;
		transition: 1s opacity;
	}

	.statusbox {
		color: red;
		text-shadow: 2px 2px 2px white;
    }

	#progress_bars {
		position: fixed;
		bottom: 0;
		left: 0;
		right: 0;
	}

	.progress {
		display: block;
		height: 0.5em;
		margin-bottom: 4px;
		background-color: white;
		border: 4px solid blue;
		max-width: 100%;
		width: 0;
	}

	#crosshair1 {
		position: fixed;
		top: 20%;
		right: 25%;
		width: 5%;
		height: 5%;
		z-index: -50;
		border-right: 5px inset red;
		border-top: 5px inset red;
		box-shadow: inset 0 0 0 4px #eee,
	}

	#crosshair2 {
		position: fixed;
		bottom: 25%;
		left: 20%;
		width: 5%;
		height: 5%;
		z-index: -50;
		border-left: 5px inset red;
		border-bottom: 5px inset red;
		box-shadow: inset 0 0 0 4px #eee,
	}

</style>

<div id="container">
	<video id="video" autoplay="true"  playsinline="true" muted="true">
	</video>
</div>

<div id="crosshair1"></div>
<div id="crosshair2"></div>

<div class="debug_menu">
<div class="statusbox" id="errorbox">hi</div>
<div class="statusbox" id="t0">hi</div>
<div class="statusbox" id="t1">hi</div>
<div class="statusbox" id="tdec">hi</div>
<button id="screenshot_btn" onclick="Dec.capture_frame()">Capture</button>
</div>

<div id="progress_bars">
<div class="progress"></div>
</div>

<script type="text/javascript">
	if ('serviceWorker' in navigator) {
		navigator.serviceWorker.register('./sw.js');
	}
	var video = document.querySelector('#video');

	var Module = {};
	Module.onRuntimeInitialized = () => {
		Dec.init(video, 2);
		Dec.render_progress([0.1, 0.5, 0.99]);
	};
</script>

<script src="cimbar_js.js"></script>
<script src="dec.js"></script>

</body>
</html>
